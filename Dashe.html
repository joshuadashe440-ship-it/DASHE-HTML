<form>
    <fieldset> <legend>Student Orientation Registeration</legend>

        <p></p>
        <label for="fullname">Fullname:</label>
        <input type="text" id="fullname" name="fullname">

         <p></p>
        
         <label for="mat">Matric No:</label>
        <input type="number" id="mat" name="mat">


          <p></p>
        <label for="email">Email:</label>
        <input type="text" id="email" name="email">

        <p></p>
         <label for="age">Age:</label>
         <input type="number" id="age" name="age">

          <p>Gender:</p>
        <input type="radio" id="male" name="male" value="male">
        <label for="male">MALE</label>
        <input type="radio" id="female" name="female" value="female">
        <label for="female">FEMALE</label>

         <p></p>
         <label for="dob">DOB:</label>
         <input type="date" id="don" name="dob">

        <p></p>
       <label for="faculty">Faculty:</label>
<select id="faculty" name="faculty">
<option value="science">Science</option>
<option value="arts">Arts</option>
<option value="management">Management Sciences</option>
</select><br><br>

       <p>Documents Submitted:</p>
<input type="checkbox" id="admission" name="docs" value="Admission
Letter">
<label for="admission">Admission Letter</label>
<input type="checkbox" id="receipt" name="docs" value="Payment
Receipt">
<label for="receipt">Payment Receipt</label><br><br>

        <p></p>
        <label for="pass">Passport:</label>
        <input type="file" id="pass" name="pass">


        
         <p></p>
         <label for="message">Additional Comments:</label><br>
<textarea id="message" name="message" rows="4"
cols="40"></textarea><br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">
</fieldset>
   
</form>
